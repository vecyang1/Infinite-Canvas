<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>AI Studio</title>
    <style>
        html.studio-route-booting body {
            visibility: hidden !important;
        }
    </style>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
                if(localStorage.getItem('studio_sidebar_pinned') === 'true') {
                    document.documentElement.classList.add('studio-sidebar-pinned-boot');
                }
                document.documentElement.classList.add('studio-route-booting');
            } catch(e) {}
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/theme.js?v=20260516-theme-sync"></script>
    <script src="/static/i18n.js?v=20260518-sidebar-pin"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        /* 本地 Tailwind 工具类兜底：CDN 慢/未就绪时也能立刻给图标尺寸，避免首屏左侧栏空白 */
        .w-1\.5 { width: 0.375rem; }
        .h-1\.5 { height: 0.375rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .flex-shrink-0 { flex-shrink: 0; }
        .rounded-full { border-radius: 9999px; }
        .mb-12 { margin-bottom: 3rem; }
        .transition-colors { transition-property: color, background-color, border-color, fill, stroke; transition-duration: 150ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse { animation: studio-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes studio-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        :root {
            --accent: #000000;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #ffffff;
            --sidebar-bg: #ffffff;
            --stage-bg: #fcfcfc;
            --border: #f2f2f2;
            --stage-border: #f0f0f0;
            --text: #121212;
            --muted: #999;
            --nav-hover-bg: #fafafa;
            --monitor-bg: rgba(255, 255, 255, 0.7);
            --monitor-border: rgba(0, 0, 0, 0.05);
            --monitor-shadow: rgba(0, 0, 0, 0.04);
            --divider: rgba(0, 0, 0, 0.1);
            --scrollbar: #d8d8d8;
            --scrollbar-hover: #c0c0c0;
            --author-name: #000;
            --social-icon: #ccc;
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #0f141d;
            --sidebar-bg: #0f141d;
            --stage-bg: #111722;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --monitor-bg: rgba(23, 29, 41, 0.82);
            --monitor-border: rgba(255, 255, 255, 0.08);
            --monitor-shadow: rgba(0, 0, 0, 0.3);
            --divider: rgba(255, 255, 255, 0.15);
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
            --author-name: #e5e9f0;
            --social-icon: #64748b;
        }

        /* 极简滚动条 */
        html,
        body {
            overscroll-behavior: auto;
        }

        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 3px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
            min-height: 36px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            width: 80px;
            min-width: 80px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            padding: 40px 0;
            transition: width 0.5s var(--fluid-ease) 0.5s, background 0.3s, border-color 0.3s;
            position: relative;
            z-index: 50;
        }

        .sidebar:hover,
        .sidebar.is-pinned,
        html.studio-sidebar-pinned-boot .sidebar {
            width: 220px;
            transition-delay: 0s;
        }

        /* 首次加载时与 iframe 的 0.5s 淡入同步播放，避免侧栏"焊死"在原地造成视觉断层 */
        @keyframes sidebar-enter {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        html:not(.studio-route-booting) .sidebar {
            animation: sidebar-enter 0.5s var(--fluid-ease);
        }

        .logo-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--text);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 仅保留 hover 真正会用到的属性过渡，避免 transition: all 因首屏属性补齐被意外触发 */
            transition: transform 0.6s var(--fluid-ease) 0.5s, border-radius 0.6s var(--fluid-ease) 0.5s, border-color 0.3s;
        }

        .sidebar:hover .logo-ring,
        .sidebar.is-pinned .logo-ring,
        html.studio-sidebar-pinned-boot .sidebar .logo-ring {
            transform: rotate(90deg);
            border-radius: 50%;
            transition-delay: 0s;
        }

        /* 导航项 */
        .nav-item {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 18px;
            cursor: pointer;
            /* 只对 width 做带延迟的过渡（侧栏悬停展开效果）；background/color 不参与过渡，避免 active 切换时底色"流动" */
            transition: width 0.3s var(--fluid-ease) 0.5s;
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
        }

        .sidebar:hover .nav-item,
        .sidebar.is-pinned .nav-item,
        html.studio-sidebar-pinned-boot .sidebar .nav-item {
            width: 190px;
            transition-delay: 0s;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        html.theme-dark .nav-item.active,
        body.theme-dark .nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-text {
            opacity: 0;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s 0.5s;
        }

        .sidebar:hover .nav-text,
        .sidebar.is-pinned .nav-text,
        html.studio-sidebar-pinned-boot .sidebar .nav-text {
            opacity: 1;
            transition-delay: 0.1s;
        }

        /* 主舞台区 */
        .stage {
            flex: 1;
            background: var(--stage-bg);
            margin: 16px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--stage-border);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 左下角监视器 */
        .nano-monitor {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--monitor-bg);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--monitor-border);
            box-shadow: 0 4px 20px var(--monitor-shadow);
            font-family: monospace;
            transition: all 0.4s var(--fluid-ease);
        }

        .nano-monitor.is-busy {
            background: #000;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .nano-monitor.is-busy .stat-group {
            color: #fff;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(255, 255, 255, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

        /* 作者组件 */
        .author-box {
            width: 100%;
            height: 60px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .dx-letter {
            position: absolute;
            font-size: 14px;
            font-weight: 800;
            color: var(--text);
            /* 只过渡 hover 时真正改的 transform/opacity，避免 all 触发延迟 */
            transition: transform 0.5s var(--fluid-ease) 0.4s, opacity 0.5s var(--fluid-ease) 0.4s;
            z-index: 10;
        }

        .letter-d { transform: translateX(-8px); }
        .letter-x { transform: translateX(8px); }

        .sidebar:hover .letter-d,
        .sidebar.is-pinned .letter-d,
        html.studio-sidebar-pinned-boot .sidebar .letter-d {
            transform: translateX(-120px);
            opacity: 0;
            transition-delay: 0s;
        }

        .sidebar:hover .letter-x,
        .sidebar.is-pinned .letter-x,
        html.studio-sidebar-pinned-boot .sidebar .letter-x {
            transform: translateX(120px);
            opacity: 0;
            transition-delay: 0s;
        }

        .author-content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s var(--fluid-ease) 0s;
            pointer-events: none;
        }

        .sidebar:hover .author-content-wrap,
        .sidebar.is-pinned .author-content-wrap,
        html.studio-sidebar-pinned-boot .sidebar .author-content-wrap {
            opacity: 1;
            transform: scale(1);
            transition-delay: 0.2s;
            pointer-events: auto;
        }

        .author-name-lite {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--author-name);
        }

        .social-row-lite { display: flex; gap: 12px; }

        .social-icon-lite {
            color: var(--social-icon);
            transition: color 0.2s, transform 0.2s;
        }

        .social-icon-lite:hover {
            color: var(--text);
            transform: translateY(-1px);
        }

        .side-actions {
            margin-top:auto;
            margin-bottom:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            width:100%;
        }

        .side-pill {
            width:44px;
            height:36px;
            border-radius:999px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* 只过渡 hover/激活会改的属性，避免 all 触发延迟 */
            transition: width 0.3s var(--fluid-ease) 0.5s, gap 0.3s var(--fluid-ease) 0.5s, background-color 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
            overflow:hidden;
            gap:8px;
            position:relative;
        }

        .sidebar:hover .side-pill,
        .sidebar.is-pinned .side-pill,
        html.studio-sidebar-pinned-boot .sidebar .side-pill {
            width: 170px;
            transition-delay: 0s;
        }

        .side-pill:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .side-pill.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .side-pill svg { width: 16px; height: 16px; flex:0 0 auto; }
        .side-pill-text {
            opacity:0;
            max-width:0;
            font-size:12px;
            font-weight:800;
            letter-spacing:.02em;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.3s 0.5s, max-width 0.3s var(--fluid-ease) 0.5s;
        }
        .sidebar:hover .side-pill-text,
        .sidebar.is-pinned .side-pill-text,
        html.studio-sidebar-pinned-boot .sidebar .side-pill-text {
            opacity:1;
            max-width:120px;
            transition-delay:.15s;
        }
        /* 折叠态去除 gap，避免图标被推偏 */
        .side-pill { gap:0; }
        .sidebar:hover .side-pill,
        .sidebar.is-pinned .side-pill,
        html.studio-sidebar-pinned-boot .sidebar .side-pill { gap:8px; }

        .sidebar-pin-btn:focus-visible {
            outline:2px solid var(--text);
            outline-offset:2px;
        }

        .sidebar-pin-btn.is-active {
            background:var(--nav-hover-bg);
            color:var(--text);
            border-color:var(--stage-border);
        }

        .sidebar-pin-btn svg {
            transition:transform 0.2s var(--fluid-ease);
        }

        .sidebar-pin-btn.is-active svg {
            transform:rotate(-45deg);
        }

    </style>
</head>

<body>

    <div class="app-shell">
        <aside class="sidebar" id="app-sidebar">
            <div class="logo-ring mb-12">
                <div class="w-1.5 h-1.5 rounded-full transition-colors" id="logo-dot" style="background:var(--text)"></div>
            </div>

            <nav>
                <div class="nav-item active" onclick="switchUI(this, 'zimage')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.587-1.587a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>

                    </svg>
                    <span class="nav-text" data-i18n="nav.enhance">细节增强</span>
                </div>
                <div class="nav-item" onclick="switchUI(this, 'klein')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>

                <div style="width:32px;height:1px;background:var(--border);margin:8px auto;transition:background 0.3s;"></div>

                <div class="nav-item" onclick="switchUI(this, 'online')">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <span class="nav-text" data-i18n="nav.canvas">无限画布</span>
                </div>
            </nav>

            <div class="side-actions">
                <button class="side-pill sidebar-pin-btn" onclick="toggleSidebarPin()" id="sidebar-pin-toggle" type="button" aria-pressed="false" aria-label="固定侧边栏" title="固定侧边栏" data-i18n-title="common.pinSidebar">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 17v5"></path>
                        <path d="M5 17h14"></path>

                    </svg>
                    <span class="side-pill-text" id="sidebar-pin-text" data-i18n="common.pinSidebar">固定侧边栏</span>
                </button>
                <button class="side-pill" onclick="toggleTheme()" id="theme-toggle-btn" type="button" title="切换夜间模式">
                    <svg id="icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="icon-sun" style="display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <span class="side-pill-text" data-i18n="common.darkMode">黑夜模式</span>
                </button>
                <button class="side-pill" onclick="toggleLanguage()" id="lang-toggle-btn" type="button" title="Language">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M2 12h20"></path>

                    if(pageId && pageId !== 'zimage') {
                        document.querySelectorAll('.nav-item.active, .side-pill.active').forEach(function(n){
                            n.classList.remove('active');
                        });
                        var target = document.querySelector('[onclick*="\'' + pageId + '\'"]');
                        if(target) target.classList.add('active');
                    }
                } catch(e) {}
            })();
        </script>

            <div class="nano-monitor" id="nano-monitor">

                </div>

                    <span class="label-nano">QUEUE</span>
                    <span id="queue-val">0</span>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);
        const ACTIVE_PAGE_KEY = 'studio_active_page';
        const SIDEBAR_PIN_KEY = 'studio_sidebar_pinned';
        const DEFAULT_PAGE_ID = 'zimage';
        const PAGE_IDS = ['zimage','enhance','klein','angle','online','gpt-chat','canvas','api-settings','comfyui-settings'];

        function sidebarPinLabelKey(pinned = isSidebarPinned()) {
            return pinned ? 'common.unpinSidebar' : 'common.pinSidebar';
        }

        function sidebarPinLabel(pinned = isSidebarPinned()) {
            const fallback = pinned ? '取消固定侧边栏' : '固定侧边栏';
            return window.StudioI18n ? window.StudioI18n.t(sidebarPinLabelKey(pinned)) : fallback;
        }

        function sidebarPinAriaLabel() {
            return window.StudioI18n ? window.StudioI18n.t('common.pinSidebar') : '固定侧边栏';
        }

        function isSidebarPinned() {
            try {
                return localStorage.getItem(SIDEBAR_PIN_KEY) === 'true';
            } catch(e) {
                return false;
            }
        }

        function setSidebarPinned(next) {
            const pinned = !!next;
            try {
                localStorage.setItem(SIDEBAR_PIN_KEY, pinned ? 'true' : 'false');
            } catch(e) {}
            updateSidebarPinButton(pinned);
        }

        function toggleSidebarPin() {
            setSidebarPinned(!isSidebarPinned());
        }

        function updateSidebarPinButton(pinned = isSidebarPinned()) {
            const sidebar = document.getElementById('app-sidebar');
            const button = document.getElementById('sidebar-pin-toggle');
            const text = document.getElementById('sidebar-pin-text');
            const labelKey = sidebarPinLabelKey(pinned);
            const label = sidebarPinLabel(pinned);
            sidebar?.classList.toggle('is-pinned', pinned);
            document.documentElement.classList.toggle('studio-sidebar-pinned-boot', pinned);
            if(button) {
                button.classList.toggle('is-active', pinned);
                button.setAttribute('aria-pressed', pinned ? 'true' : 'false');
                button.setAttribute('aria-label', sidebarPinAriaLabel());
                button.setAttribute('title', label);
                button.setAttribute('data-i18n-title', labelKey);
            }
            if(text) {
                text.setAttribute('data-i18n', labelKey);
                text.textContent = label;
            }
        }

        function switchUI(el, id, options = {}) {
            if(!PAGE_IDS.includes(id)) id = DEFAULT_PAGE_ID;
            document.querySelectorAll('.nav-item,.side-pill').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const target = document.getElementById('frame-' + id);
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            if(!options.skipRemember) localStorage.setItem(ACTIVE_PAGE_KEY, id);
            // sync theme to newly activated iframe
            syncThemeToFrame(target);
            syncLanguageToFrame(target);
            // 切换到画布时通知刷新工作流列表（防止在 comfyui-settings 修改后画布未及时更新）
            if (id === 'canvas' && target.src) {
                try { target.contentWindow?.postMessage({ type: 'canvas-focus' }, '*'); } catch(e) {}
            }
        }

        function restoreActivePage() {
            const id = PAGE_IDS.includes(localStorage.getItem(ACTIVE_PAGE_KEY)) ? localStorage.getItem(ACTIVE_PAGE_KEY) : DEFAULT_PAGE_ID;
            const trigger = document.querySelector(`[onclick*="'${id}'"],[onclick*='"${id}"']`);
            switchUI(trigger, id, { skipRemember:true });
            document.documentElement.classList.remove('studio-route-booting');
        }
        document.addEventListener('DOMContentLoaded', restoreActivePage, { once:true });

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const logoDot = document.getElementById('logo-dot');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor.classList.add('is-busy');
                    queueVal.innerText = `${pos}/${total}`;
                    logoDot.style.backgroundColor = '#3b82f6';
                } else {
                    monitor.classList.remove('is-busy');
                    queueVal.innerText = total > 0 ? total : '0';
                    logoDot.style.backgroundColor = 'var(--text)';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    document.getElementById('online-val').innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'canvas_updated') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 夜间模式 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'light';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        function toggleLanguage() {
            if(!window.StudioI18n) return;
            window.StudioI18n.toggle();
            document.querySelectorAll('iframe').forEach(frame => syncLanguageToFrame(frame));
        }

        function syncLanguageToFrame(frame) {
            if(!window.StudioI18n) return;
            try {
                frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
            } catch(e) {}
        }

        function broadcastLanguage() {
            document.querySelectorAll('iframe').forEach(frame => {
                try {
                    frame.contentWindow?.postMessage({ type:'studio-lang', lang:window.StudioI18n.lang() }, '*');
                } catch(e) {}
            });
        }

        // listen for theme changes triggered by theme.js
        window.addEventListener('studio-theme-change', (e) => {
            updateThemeIcon(e.detail.theme);
        });

        window.addEventListener('studio-lang-change', () => {
            updateSidebarPinButton();
        });

        // init icon state on load
        window.addEventListener('DOMContentLoaded', () => {
            const theme = window.StudioTheme ? window.StudioTheme.get() : 'light';
            updateThemeIcon(theme);
            if(window.StudioI18n) window.StudioI18n.apply();
            broadcastLanguage();
            updateSidebarPinButton();
        });

        // sync theme when iframe loads
        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => {
                syncThemeToFrame(f);
                syncLanguageToFrame(f);
            });
        });
    </script>
